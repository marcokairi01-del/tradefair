<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Fair Capture" />
<meta name="format-detection" content="telephone=no" />
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23007AFF'/><stop offset='1' stop-color='%230040C8'/></linearGradient></defs><rect width='180' height='180' rx='40' fill='url(%23g)'/><circle cx='90' cy='95' r='32' fill='none' stroke='white' stroke-width='8'/><rect x='66' y='52' width='48' height='12' rx='3' fill='white'/><circle cx='90' cy='95' r='14' fill='white'/></svg>" />
<title>Fair Capture</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
/* ============================================================
   iOS Design System — Trade Fair Capture
   ============================================================ */

/* ---------- Tokens (light) ---------- */
:root{
  --systemBackground: #ffffff;
  --secondarySystemBackground: #f2f2f7;
  --tertiarySystemBackground: #ffffff;
  --systemGroupedBackground: #f2f2f7;
  --secondarySystemGroupedBackground: #ffffff;
  --label: #000000;
  --secondaryLabel: rgba(60,60,67,0.60);
  --tertiaryLabel: rgba(60,60,67,0.30);
  --quaternaryLabel: rgba(60,60,67,0.18);
  --separator: rgba(60,60,67,0.29);
  --opaqueSeparator: #c6c6c8;
  --systemBlue: #007AFF;
  --systemGreen: #34C759;
  --systemRed: #FF3B30;
  --systemOrange: #FF9500;
  --systemYellow: #FFCC00;
  --systemPurple: #AF52DE;
  --systemPink: #FF2D55;
  --systemIndigo: #5856D6;
  --systemTeal: #5AC8FA;
  --systemGray: #8E8E93;
  --systemGray2: #AEAEB2;
  --systemGray3: #C7C7CC;
  --systemGray4: #D1D1D6;
  --systemGray5: #E5E5EA;
  --systemGray6: #F2F2F7;
  --fill: rgba(120,120,128,0.20);
  --fill2: rgba(120,120,128,0.16);
  --fill3: rgba(118,118,128,0.12);
  --fill4: rgba(116,116,128,0.08);
  --tint: var(--systemBlue);
  --nav-bg: rgba(249,249,249,0.94);
  --tab-bg: rgba(249,249,249,0.92);
  --modal-overlay: rgba(0,0,0,0.4);
  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
  --safe-left: env(safe-area-inset-left, 0);
  --safe-right: env(safe-area-inset-right, 0);
  --nav-h: 44px;
  --large-title-h: 52px;
  --tab-h: 49px;
  --row-h: 44px;
}
@media (prefers-color-scheme: dark){
  :root{
    --systemBackground: #000000;
    --secondarySystemBackground: #1c1c1e;
    --tertiarySystemBackground: #2c2c2e;
    --systemGroupedBackground: #000000;
    --secondarySystemGroupedBackground: #1c1c1e;
    --label: #ffffff;
    --secondaryLabel: rgba(235,235,245,0.60);
    --tertiaryLabel: rgba(235,235,245,0.30);
    --quaternaryLabel: rgba(235,235,245,0.16);
    --separator: rgba(84,84,88,0.65);
    --opaqueSeparator: #38383a;
    --systemBlue: #0A84FF;
    --systemGreen: #30D158;
    --systemRed: #FF453A;
    --systemOrange: #FF9F0A;
    --systemYellow: #FFD60A;
    --systemPurple: #BF5AF2;
    --systemPink: #FF375F;
    --systemIndigo: #5E5CE6;
    --systemGray: #8E8E93;
    --systemGray2: #636366;
    --systemGray3: #48484A;
    --systemGray4: #3A3A3C;
    --systemGray5: #2C2C2E;
    --systemGray6: #1C1C1E;
    --fill: rgba(120,120,128,0.36);
    --fill2: rgba(120,120,128,0.32);
    --fill3: rgba(118,118,128,0.24);
    --fill4: rgba(118,118,128,0.18);
    --tint: var(--systemBlue);
    --nav-bg: rgba(22,22,23,0.84);
    --tab-bg: rgba(22,22,23,0.84);
    --modal-overlay: rgba(0,0,0,0.55);
  }
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea,[contenteditable]{-webkit-user-select:auto;user-select:auto}
html,body{
  margin:0;padding:0;
  background:var(--systemGroupedBackground);
  color:var(--label);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
  font-size:17px;line-height:22px;letter-spacing:-0.011em;
  overscroll-behavior-y:contain;
  -webkit-font-smoothing:antialiased;
}
body{min-height:100vh;min-height:100dvh}
button{background:none;border:0;cursor:pointer;padding:0;font:inherit;color:inherit}
input,textarea,select{font:inherit;color:inherit}
a{color:var(--tint);text-decoration:none}
img{display:block;max-width:100%}

/* ---------- App layout ---------- */
.app{
  min-height:100vh;min-height:100dvh;
  padding-top:calc(var(--safe-top) + var(--nav-h));
  padding-bottom:calc(var(--safe-bottom) + var(--tab-h));
  padding-left:var(--safe-left);padding-right:var(--safe-right);
  position:relative;
}
.app.has-large{padding-top:calc(var(--safe-top) + var(--nav-h) + var(--large-title-h))}
.app.no-tab{padding-bottom:var(--safe-bottom)}

/* ---------- Navigation Bar ---------- */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:60;
  background:var(--nav-bg);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-bottom:0.5px solid transparent;
  padding-top:var(--safe-top);
  transition:border-color .15s ease;
}
.navbar.scrolled{border-bottom-color:var(--separator)}
.nav-row{
  height:var(--nav-h);
  display:flex;align-items:center;
  padding:0 8px;
  position:relative;
}
.nav-title{
  position:absolute;left:0;right:0;top:0;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:600;letter-spacing:-0.011em;
  color:var(--label);
  pointer-events:none;
  transition:opacity .15s ease;
}
.app.has-large .nav-title{opacity:0}
.app.has-large.scrolled .nav-title{opacity:1}
.nav-back, .nav-action{
  min-width:32px;min-height:32px;
  display:inline-flex;align-items:center;
  padding:6px 8px;
  font-size:17px;color:var(--tint);
  letter-spacing:-0.011em;
  cursor:pointer;
  z-index:1;
}
.nav-back:active, .nav-action:active{opacity:.4}
.nav-back svg{width:13px;height:21px;margin-inline-end:5px}
.nav-action.bold{font-weight:600}
.nav-spacer{flex:1}

.large-title{
  padding:6px 16px 8px;
  font-size:34px;font-weight:700;letter-spacing:-0.022em;line-height:41px;
  color:var(--label);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  transition:transform .15s ease,opacity .15s ease;
}
.app.has-large.scrolled .large-title{transform:translateY(-100%);opacity:0;pointer-events:none}

/* ---------- Tab Bar ---------- */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:55;
  background:var(--tab-bg);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-top:0.5px solid var(--separator);
  padding-bottom:var(--safe-bottom);
  display:grid;grid-template-columns:repeat(5,1fr);
}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  height:var(--tab-h);
  color:var(--systemGray);
  font-size:10px;font-weight:500;letter-spacing:0.01em;
  -webkit-tap-highlight-color:transparent;
  transition:transform .08s ease;
}
.tab.active{color:var(--tint)}
.tab:active{transform:scale(.94)}
.tab svg{width:25px;height:25px;stroke-width:1.6;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tab.active svg{stroke-width:2}
.tab.center svg{width:34px;height:34px;stroke-width:1.4}

/* ---------- Page transitions ---------- */
.page{
  animation:pageIn .28s cubic-bezier(.32,.72,.35,1);
}
.page-back{animation:pageBack .28s cubic-bezier(.32,.72,.35,1)}
@keyframes pageIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pageBack{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ---------- Lists / Inset Grouped ---------- */
.list-section{margin:0 16px 22px}
.list-section-header{
  font-size:13px;letter-spacing:0;line-height:18px;
  color:var(--secondaryLabel);
  text-transform:uppercase;
  padding:14px 4px 6px;
  font-weight:400;
}
.list-section-footer{
  font-size:13px;color:var(--secondaryLabel);
  padding:6px 4px 0;
  line-height:18px;
}
.list{
  background:var(--secondarySystemGroupedBackground);
  border-radius:10px;overflow:hidden;
}
.list-row{
  min-height:var(--row-h);
  padding:11px 16px;
  display:flex;align-items:center;gap:12px;
  position:relative;
  color:var(--label);
  font-size:17px;
}
.list-row + .list-row::before{
  content:"";position:absolute;top:0;inset-inline-start:16px;inset-inline-end:0;
  height:0.5px;background:var(--separator);
}
.list-row.tap{cursor:pointer}
.list-row.tap:active{background:var(--fill4)}
.list-row .lead-icon{
  width:29px;height:29px;border-radius:7px;
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--systemBlue);color:#fff;
  flex-shrink:0;
}
.list-row .lead-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.list-row .lead-icon.gray{background:var(--systemGray)}
.list-row .lead-icon.green{background:var(--systemGreen)}
.list-row .lead-icon.orange{background:var(--systemOrange)}
.list-row .lead-icon.purple{background:var(--systemPurple)}
.list-row .lead-icon.red{background:var(--systemRed)}
.list-row .row-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.list-row .row-title{font-size:17px;letter-spacing:-0.011em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-row .row-sub{font-size:13px;color:var(--secondaryLabel);letter-spacing:-0.001em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-row .row-value{font-size:17px;color:var(--secondaryLabel)}
.list-row .row-chev{color:var(--tertiaryLabel);flex-shrink:0}
.list-row .row-chev svg{width:7px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.list-row .row-badge{
  font-size:13px;color:#fff;background:var(--systemRed);
  padding:1px 8px;border-radius:999px;font-weight:600;min-width:22px;text-align:center;
}

/* ---------- Form rows ---------- */
.form-row{
  min-height:var(--row-h);
  padding:11px 16px;
  display:flex;align-items:center;gap:12px;
  position:relative;
}
.form-row + .form-row::before{
  content:"";position:absolute;top:0;inset-inline-start:16px;inset-inline-end:0;
  height:0.5px;background:var(--separator);
}
.form-row .flabel{
  font-size:17px;color:var(--label);min-width:90px;flex-shrink:0;
}
.form-row .finput{
  flex:1;background:transparent;border:0;outline:0;
  font-size:17px;color:var(--label);
  text-align:end;letter-spacing:-0.011em;
  min-width:0;
}
.form-row .finput::placeholder{color:var(--tertiaryLabel)}
.form-row.full{flex-direction:column;align-items:stretch;gap:6px;padding:11px 16px}
.form-row.full .flabel{min-width:0}
.form-row.full .finput{text-align:start}
.form-row.full .ftext{
  width:100%;background:transparent;border:0;outline:0;
  font-size:17px;color:var(--label);min-height:80px;resize:vertical;
  font-family:inherit;
}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  height:50px;padding:0 18px;
  border-radius:14px;
  font-size:17px;font-weight:600;letter-spacing:-0.011em;
  background:var(--tint);color:#fff;
  transition:transform .08s ease,opacity .12s ease;
  cursor:pointer;
  width:100%;
}
.btn:active{transform:scale(.98);opacity:.85}
.btn.tinted{background:rgba(0,122,255,0.15);color:var(--tint)}
@media(prefers-color-scheme:dark){.btn.tinted{background:rgba(10,132,255,0.20)}}
.btn.gray{background:var(--fill3);color:var(--label)}
.btn.plain{background:transparent;color:var(--tint);font-weight:500}
.btn.destructive{background:var(--systemRed);color:#fff}
.btn.destructive-tinted{background:rgba(255,59,48,0.15);color:var(--systemRed)}
.btn.compact{height:36px;font-size:15px;padding:0 14px;border-radius:10px;font-weight:500;width:auto}
.btn.compact.dense{height:30px;font-size:13px;padding:0 12px;border-radius:8px}
.btn-stack{display:flex;flex-direction:column;gap:10px;padding:0 16px}

/* ---------- Cards / Tiles ---------- */
.tile{
  background:var(--secondarySystemGroupedBackground);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 0 0 0.5px var(--separator);
}
.spacer-12{height:12px}
.spacer-16{height:16px}
.spacer-24{height:24px}
.spacer-40{height:40px}

/* ---------- Filters / Segmented ---------- */
.segmented{
  display:inline-flex;background:var(--fill3);
  border-radius:9px;padding:2px;gap:0;
  margin:0 16px 8px;width:calc(100% - 32px);
}
.segmented button{
  flex:1;height:32px;font-size:13px;font-weight:500;letter-spacing:-0.001em;
  color:var(--label);border-radius:7px;
  transition:background .12s ease;
}
.segmented button[aria-pressed="true"]{
  background:var(--secondarySystemBackground);
  font-weight:600;
  box-shadow:0 0 0 0.5px var(--separator),0 3px 8px rgba(0,0,0,0.04);
}

.chip-row{
  display:flex;gap:8px;overflow-x:auto;padding:8px 16px 12px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.chip-row::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;height:34px;padding:0 14px;border-radius:17px;
  background:var(--fill3);color:var(--label);
  font-size:14px;font-weight:500;
  display:inline-flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.chip[aria-pressed="true"]{background:var(--tint);color:#fff}
.chip:active{opacity:.7}

/* ---------- Search ---------- */
.search-wrap{padding:0 16px 8px}
.search{
  display:flex;align-items:center;gap:6px;
  background:var(--fill3);border-radius:10px;padding:8px 10px;
  height:36px;
}
.search svg{width:16px;height:16px;color:var(--secondaryLabel);stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.search input{
  flex:1;background:transparent;border:0;outline:0;
  font-size:17px;color:var(--label);min-width:0;
}
.search input::placeholder{color:var(--secondaryLabel)}

/* ---------- Product Gallery ---------- */
.grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:12px;
  padding:0 16px 12px;
}
@media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:780px){.grid{grid-template-columns:repeat(4,1fr)}}
.pcard{
  position:relative;background:var(--secondarySystemGroupedBackground);
  border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 0 0 0.5px var(--separator);
  transition:transform .1s ease;cursor:pointer;
}
.pcard:active{transform:scale(.97)}
.pcard .thumb{aspect-ratio:1;background:var(--fill4);position:relative}
.pcard .thumb img{width:100%;height:100%;object-fit:cover}
.pcard .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--tertiaryLabel);font-size:34px}
.pcard .body{padding:9px 11px 11px}
.pcard .price{font-size:15px;font-weight:600;letter-spacing:-0.011em}
.pcard .meta{font-size:12px;color:var(--secondaryLabel);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcard .badge-rating{
  position:absolute;top:6px;inset-inline-end:6px;
  background:rgba(0,0,0,0.7);color:#fff;
  border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.pcard .badge-cat{
  position:absolute;bottom:6px;inset-inline-start:6px;
  background:rgba(255,255,255,0.92);color:#000;
  border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600;
}
@media(prefers-color-scheme:dark){.pcard .badge-cat{background:rgba(60,60,60,0.92);color:#fff}}
.pcard .badge-count{
  position:absolute;top:6px;inset-inline-start:6px;
  background:rgba(0,0,0,0.7);color:#fff;
  border-radius:999px;padding:2px 6px;font-size:10px;font-weight:500;
  display:inline-flex;align-items:center;gap:3px;
}

/* ---------- Empty state ---------- */
.empty{
  text-align:center;padding:60px 24px;
  color:var(--secondaryLabel);
}
.empty .em-icon{
  width:64px;height:64px;border-radius:14px;
  background:var(--fill3);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:16px;color:var(--secondaryLabel);
}
.empty .em-icon svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.empty h2{font-size:22px;font-weight:600;margin:0 0 6px;color:var(--label);letter-spacing:-0.018em}
.empty p{margin:0 0 24px;max-width:280px;margin-inline:auto;font-size:15px;line-height:20px}
.empty .btn{max-width:280px;margin-inline:auto}

/* ---------- Banner (active session) ---------- */
.banner{
  position:fixed;
  top:calc(var(--safe-top) + var(--nav-h));
  left:0;right:0;z-index:55;
  background:var(--tint);color:#fff;
  padding:8px 16px;
  display:flex;align-items:center;gap:10px;justify-content:space-between;
  font-size:14px;font-weight:500;
  box-shadow:0 4px 20px rgba(0,122,255,0.25);
}
.app.has-banner{padding-top:calc(var(--safe-top) + var(--nav-h) + 38px)}
.app.has-banner.has-large{padding-top:calc(var(--safe-top) + var(--nav-h) + var(--large-title-h) + 38px)}
.banner-meta{font-size:12px;opacity:.85;font-weight:400}
.banner-actions{display:flex;gap:6px;flex-shrink:0}
.banner-actions button{
  background:rgba(255,255,255,0.20);color:#fff;
  border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600;
}
.banner-actions button:active{background:rgba(255,255,255,0.32)}

/* ---------- Photo capture ---------- */
.photo-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  padding:0 16px 4px;
}
.photo-slot{
  aspect-ratio:1;background:var(--fill3);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  color:var(--secondaryLabel);
}
.photo-slot.has{background:var(--systemGray6)}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-slot .add-icn{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:var(--secondaryLabel)}
.photo-slot .add-icn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.photo-slot .remove-x{
  position:absolute;top:4px;inset-inline-end:4px;
  width:26px;height:26px;border-radius:50%;
  background:rgba(0,0,0,0.7);color:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  z-index:2;
}
.photo-slot .remove-x svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.photo-slot .main-flag{
  position:absolute;bottom:4px;inset-inline-start:4px;
  background:rgba(255,255,255,0.92);color:#000;
  font-size:10px;font-weight:600;padding:2px 6px;border-radius:999px;
  z-index:2;
}

.bigphoto{
  margin:0 16px;
  aspect-ratio:16/10;background:var(--fill3);border-radius:14px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  color:var(--secondaryLabel);
}
.bigphoto.has{background:#000}
.bigphoto img{width:100%;height:100%;object-fit:contain}
.bigphoto input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.bigphoto .add-block{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:14px;font-weight:500}

<script>
"use strict";

/* ============================================================
   IndexedDB
   ============================================================ */
const DB_NAME = "tradefair_ios";
const DB_VER  = 1;
let dbp = null;
function openDB(){
  if (dbp) return dbp;
  dbp = new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains("suppliers")){
        const s = db.createObjectStore("suppliers",{keyPath:"id"});
        s.createIndex("date","dateAdded");
      }
      if(!db.objectStoreNames.contains("products")){
        const p = db.createObjectStore("products",{keyPath:"id"});
        p.createIndex("supplier","supplierId");
        p.createIndex("date","dateAdded");
        p.createIndex("category","category");
        p.createIndex("rating","reviewRating");
      }
      if(!db.objectStoreNames.contains("sessions")){
        db.createObjectStore("sessions",{keyPath:"id"}).createIndex("date","dateAdded");
      }
      if(!db.objectStoreNames.contains("kv")) db.createObjectStore("kv",{keyPath:"k"});
    };
    r.onsuccess = ()=>res(r.result);
    r.onerror   = ()=>rej(r.error);
  });
  return dbp;
}
async function tx(stores, mode, fn){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const t = db.transaction(stores, mode);
    const out = fn(t);
    t.oncomplete = ()=>res(out);
    t.onerror = ()=>rej(t.error);
    t.onabort = ()=>rej(t.error);
  });
}
const idb = {
  put: (s,o)=> tx([s],"readwrite", t=>{ t.objectStore(s).put(o); return o; }),
  get: (s,id)=> tx([s],"readonly", t=>new Promise(r=>{const x=t.objectStore(s).get(id);x.onsuccess=()=>r(x.result||null)})),
  del: (s,id)=> tx([s],"readwrite", t=>{ t.objectStore(s).delete(id); }),
  all: (s)=> tx([s],"readonly", t=>new Promise(r=>{const x=t.objectStore(s).getAll();x.onsuccess=()=>r(x.result||[])})),
  clear: (s)=> tx([s],"readwrite", t=>{ t.objectStore(s).clear(); }),
};

/* ============================================================
   Utils
   ============================================================ */
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const $   = (sel,r=document)=> r.querySelector(sel);
const $$  = (sel,r=document)=> [...r.querySelectorAll(sel)];
const byId= id=> document.getElementById(id);
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
const nl2br = s => esc(s).replace(/\n/g,"<br>");
const fmtDate = ts => { if(!ts) return ""; const d=new Date(ts);return d.toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"2-digit"})+" "+d.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}); };
const today = ()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();};
const isToday = ts=> ts>=today();

function haptic(type="selection"){
  // iOS doesn't expose haptic from web (yet) but vibrate works on some Android.
  if (!navigator.vibrate) return;
  const map = { selection:[8], success:[5,40,20], warn:[10,30,10], error:[40,20,40] };
  navigator.vibrate(map[type]||[8]);
}

function toast(msg, ms=1700){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), ms);
}

/* ============================================================
   Photo resize
   ============================================================ */
function resizePhoto(file, maxDim=1400, q=.8){
  return new Promise((res,rej)=>{
    if (!file) return rej("no file");
    const r = new FileReader();
    r.onerror = rej;
    r.onload = ()=>{
      const img = new Image();
      img.onerror = rej;
      img.onload = ()=>{
        let {width:w, height:h} = img;
        const ratio = Math.min(1, maxDim/Math.max(w,h));
        w = Math.round(w*ratio); h = Math.round(h*ratio);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        res(c.toDataURL("image/jpeg", q));
      };
      img.src = r.result;
    };
    r.readAsDataURL(file);
  });
}

/* ============================================================
   Categories
   ============================================================ */
const CATEGORIES = [
  {id:"curtains",  name:"וילונות / Curtains"},
  {id:"carpets",   name:"שטיחים / Carpets"},
  {id:"furniture", name:"רהיטים / Furniture"},
  {id:"fabric",    name:"בדים / Fabric"},
  {id:"decor",     name:"דקורציה / Decor"},
  {id:"other",     name:"אחר / Other"},
];
const catShort = id => ({curtains:"וילונות",carpets:"שטיחים",furniture:"רהיטים",fabric:"בדים",decor:"דקורציה",other:"אחר"}[id]||"—");

/* ============================================================
   Scoring
   ============================================================ */
function supplierScore(prods){
  const rated  = prods.filter(p=>p.reviewRating>0);
  const avg    = rated.length ? rated.reduce((a,p)=>a+p.reviewRating,0)/rated.length : 0;
  const strong = prods.filter(p=>p.reviewRating>=4).length;
  const total  = prods.length;
  let label = "Low Interest", tone="gray";
  if (total===0)                            { label="No Products"; tone="gray"; }
  else if (strong>=2 && avg>=4)             { label="Priority Supplier"; tone="dark"; }
  else if (strong>=1 && avg>=3.5)           { label="Strong Supplier";   tone="green"; }
  else if (avg>=3 || total>=3)              { label="Interesting";       tone="orange"; }
  else                                      { label="Low Interest";      tone="gray"; }
  return {avg, strong, total, label, tone};
}

/* ============================================================
   State + Routing
   ============================================================ */
const State = {
  activeSessionId: null,
  filters: { period:"all", cat:"all", supplierId:null, ratedOnly:false, topOnly:false, q:"" },
  prevHash: ""
};

async function loadActiveSession(){
  const k = await idb.get("kv","activeSession");
  State.activeSessionId = k ? k.v : null;
}
async function setActiveSession(id){
  State.activeSessionId = id;
  await idb.put("kv",{k:"activeSession", v:id});
}

function navigate(name, params={}, replace=false){
  const hash = params.id ? `#/${name}/${params.id}` : `#/${name}`;
  State.prevHash = location.hash;
  if (replace) history.replaceState({}, "", hash);
  else if (location.hash !== hash) history.pushState({}, "", hash);
  parseHash(); render();
}
function back(){
  if (history.length>1) history.back();
  else navigate("gallery", {}, true);
}

let CURRENT_ROUTE = {name:"gallery", params:{}};
function parseHash(){
  const h = location.hash.replace(/^#\/?/,"");
  if (!h){ CURRENT_ROUTE={name:"gallery",params:{}}; return; }
  const [name, id] = h.split("/");
  CURRENT_ROUTE = {name, params: id?{id}:{}};
}
window.addEventListener("popstate", ()=>{ parseHash(); render(); });
window.addEventListener("hashchange", ()=>{ parseHash(); render(); });

/* ============================================================
   Rendering helpers
   ============================================================ */
function setNavbar({title, large=false, back:showBack=false, actions=[]}){
  const root = byId("app-root");
  root.classList.toggle("has-large", !!large);

  const bar = byId("navbar");
  let rowHtml = "";
  if (showBack){
    rowHtml += `<button class="nav-back" id="nb-back">
      <svg viewBox="0 0 13 21"><path d="M11 2L2 11l9 9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>חזרה</span>
    </button>`;
  } else {
    rowHtml += `<span class="nav-back" style="visibility:hidden">‎</span>`;
  }
  rowHtml += `<div class="nav-spacer"></div>`;
  if (!large) rowHtml += `<div class="nav-title">${esc(title||"")}</div>`;
  else rowHtml += `<div class="nav-title">${esc(title||"")}</div>`;
  actions.forEach((a,i)=>{
    rowHtml += `<button class="nav-action ${a.bold?'bold':''}" data-act="${i}">${a.icon||""}${esc(a.label||"")}</button>`;
  });

  let largeHtml = "";
  if (large){
    largeHtml = `<div class="large-title">
      <span>${esc(title||"")}</span>
      <span class="large-actions" style="display:flex;gap:8px"></span>
    </div>`;
  }

  bar.innerHTML = `<div class="nav-row">${rowHtml}</div>${largeHtml}`;

  if (showBack) byId("nb-back").addEventListener("click", ()=>{ haptic("selection"); back(); });
  actions.forEach((a,i)=>{
    bar.querySelector(`[data-act="${i}"]`)?.addEventListener("click", ()=>{ haptic("selection"); a.onClick(); });
  });
}

async function renderBanner(){
  const host = byId("banner-host");
  const root = byId("app-root");
  if (!State.activeSessionId){ host.innerHTML=""; root.classList.remove("has-banner"); return; }
  const s = await idb.get("sessions", State.activeSessionId);
  if (!s){ host.innerHTML=""; root.classList.remove("has-banner"); return; }
  const sup = s.supplierId ? await idb.get("suppliers", s.supplierId) : null;
  const products = (await idb.all("products")).filter(p=>p.supplierId===s.supplierId);

  host.innerHTML = `<div class="banner">
    <div style="flex:1;min-width:0;overflow:hidden">
      <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📍 ${esc((sup&&sup.name)||"ספק ללא שם")}</div>
      <div class="banner-meta">${products.length} מוצרים בסשן זה</div>
    </div>
    <div class="banner-actions">
      <button data-act="add">+ מוצר</button>
      <button data-act="end">סיום</button>
    </div>
  </div>`;
  root.classList.add("has-banner");
  host.querySelector('[data-act="add"]').addEventListener("click", ()=>{ haptic("selection"); navigate("addProduct",{id:s.supplierId}); });
  host.querySelector('[data-act="end"]').addEventListener("click", endSession);
}

async function endSession(){
  if (State.activeSessionId){
    const s = await idb.get("sessions", State.activeSessionId);
    if (s){
      const prods = (await idb.all("products")).filter(p=>p.supplierId===s.supplierId);
      s.productCount = prods.length;
      s.endedAt = Date.now();
      await idb.put("sessions", s);
    }
  }
  await setActiveSession(null);
  haptic("success");
  toast("הסשן הסתיים");
  render();
}

/* ============================================================
   Tab + scroll handling
   ============================================================ */
function setActiveTab(name){
  $$(".tab", byId("tabbar")).forEach(b=>{
    const map = {gallery:"gallery", suppliers:"suppliers", capture:"capture", review:"review", summary:"summary"};
    const aliases = {
      gallery:["gallery","product"],
      suppliers:["suppliers","supplier"],
      capture:["capture","session","addProduct"],
      review:["review"],
      summary:["summary","settings"]
    };
    b.classList.toggle("active", aliases[b.dataset.tab].includes(name));
  });
}

/* Scroll detection for nav border / large title collapse */
let scrollEl = null;
function attachScroll(){
  document.removeEventListener("scroll", onScroll, true);
  document.addEventListener("scroll", onScroll, {passive:true,capture:true});
  onScroll();
}
function onScroll(){

/* ============================================================

async function render(){
  const {name, params} = CURRENT_ROUTE;
  setActiveTab(name);
  await renderBanner();
  const app = byId("app");
  app.classList.remove("page-back");
  app.classList.add("page");

  switch(name){
    case "gallery":   return renderGallery();
    case "suppliers": return renderSuppliersList();
    case "capture":   return renderCaptureHub();
    case "session":   return renderSessionStart();
    case "addProduct":return renderAddProduct(params.id);
    case "product":   return renderProduct(params.id);
    case "supplier":  return renderSupplier(params.id);
    case "review":    return renderReview();
    case "summary":   return renderSummary();
    case "settings":  return renderSettings();
    default:          return renderGallery();
  }
}

/* ============================================================
   Action sheet helper
   ============================================================ */
function actionSheet({title, actions, cancel="ביטול"}){
  return new Promise(resolve=>{
    const wrap = document.createElement("div");
    wrap.className = "sheet-bg";
    const titleHtml = title ? `<div class="sheet-title">${esc(title)}</div>` : "";
    wrap.innerHTML = `
      <div class="sheet">
        ${titleHtml}
        ${actions.map((a,i)=>`<button class="sheet-action ${a.destructive?'destructive':''} ${a.bold?'bold':''}" data-i="${i}">${esc(a.label)}</button>`).join("")}
      </div>
      <button class="sheet-cancel" id="sh-cancel">${esc(cancel)}</button>
    `;
    document.body.appendChild(wrap);
    const close = (val)=>{ wrap.remove(); resolve(val); };
    wrap.addEventListener("click", e=>{ if (e.target===wrap) close(null); });
    $$(".sheet-action", wrap).forEach(b=>b.addEventListener("click", ()=>{
      haptic("selection");
      close(actions[+b.dataset.i].value);
    }));
    $("#sh-cancel", wrap).addEventListener("click", ()=>close(null));
  });
}

async function confirmSheet(message, confirmLabel="אישור", destructive=false){
  const r = await actionSheet({
    title: message,
    actions: [ { label: confirmLabel, value: true, destructive, bold:true } ],
  });
  return !!r;
}

/* ============================================================
   GALLERY
   ============================================================ */
async function renderGallery(){
  setNavbar({
    title: "מוצרים",
    large: true,
    actions: [
      { label: "+ ספק", bold:true, onClick: ()=>navigate("session") }
    ]
  });

  const app = byId("app");
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));
  const f = State.filters;

  // filter
  let filtered = [...products].sort((a,b)=>b.dateAdded-a.dateAdded);
  if (f.period==="today")  filtered = filtered.filter(p=>isToday(p.dateAdded));
  if (f.cat!=="all")       filtered = filtered.filter(p=>p.category===f.cat);
  if (f.supplierId)        filtered = filtered.filter(p=>p.supplierId===f.supplierId);
  if (f.ratedOnly)         filtered = filtered.filter(p=>p.reviewRating>0);
  if (f.topOnly)           filtered = filtered.filter(p=>p.reviewRating>=4);
  if (f.q){
    const q = f.q.toLowerCase();
    filtered = filtered.filter(p=>{
      const sup = supMap[p.supplierId];
      return (p.name||"").toLowerCase().includes(q) ||
             (p.notes||"").toLowerCase().includes(q) ||
             (p.size||"").toLowerCase().includes(q) ||
             (p.price||"").toLowerCase().includes(q) ||
             (sup&&(sup.name||"").toLowerCase().includes(q));
    });
  }

  const supplierChip = f.supplierId ? `<button class="chip" aria-pressed="true" data-clear="supplierId">${esc((supMap[f.supplierId]||{}).name||"ספק")} ✕</button>`:"";

  app.innerHTML = `
    <div class="search-wrap">
      <div class="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="חיפוש מוצר, ספק, הערה..." value="${esc(f.q||"")}" autocomplete="off">
      </div>
    </div>

    <div class="segmented">
      <button data-seg="all"   aria-pressed="${f.period==='all'}">הכל</button>
      <button data-seg="today" aria-pressed="${f.period==='today'}">היום</button>
      <button data-seg="rated" aria-pressed="${f.ratedOnly && !f.topOnly}">מדורגים</button>
      <button data-seg="top"   aria-pressed="${f.topOnly}">★ מעולים</button>
    </div>

    <div class="chip-row">
      ${supplierChip}
      ${f.cat!=="all" ? `<button class="chip" aria-pressed="true" data-clear="cat">${esc(catShort(f.cat))} ✕</button>` :
         CATEGORIES.map(c=>`<button class="chip" data-cat="${c.id}" aria-pressed="false">${esc(catShort(c.id))}</button>`).join("")}
    </div>

    ${filtered.length===0 ? renderEmptyState(products.length===0, f) : `
      <div class="muted padded" style="padding-bottom:8px">${filtered.length} ${filtered.length===1?"מוצר":"מוצרים"}</div>
      <div class="grid" id="grid">
        ${filtered.map(p=>productCard(p, supMap[p.supplierId])).join("")}
      </div>
    `}
    <div class="spacer-40"></div>
  `;

  // search input — debounced
  let toid;
  $("#q").addEventListener("input", e=>{
    clearTimeout(toid);
    const v = e.target.value;
    toid = setTimeout(()=>{ f.q = v; renderGallery(); }, 250);
  });
  // segmented
  $$("[data-seg]", app).forEach(b=>b.addEventListener("click", ()=>{
    const v = b.dataset.seg;
    haptic("selection");
    if (v==="all"){ f.period="all"; f.ratedOnly=false; f.topOnly=false; }
    else if (v==="today"){ f.period= f.period==="today"?"all":"today"; }
    else if (v==="rated"){ f.ratedOnly = !f.ratedOnly; if(f.ratedOnly) f.topOnly=false; }
    else if (v==="top"){ f.topOnly = !f.topOnly; if(f.topOnly) f.ratedOnly=false; }
    renderGallery();
  }));
  // chips
  $$("[data-cat]", app).forEach(b=>b.addEventListener("click", ()=>{
    haptic("selection");
    f.cat = b.dataset.cat; renderGallery();
  }));
  $$("[data-clear]", app).forEach(b=>b.addEventListener("click", ()=>{
    haptic("selection");
    if (b.dataset.clear==="cat") f.cat="all";
    if (b.dataset.clear==="supplierId") f.supplierId=null;
    renderGallery();
  }));
  // product cards
  $$(".pcard", app).forEach(c=>c.addEventListener("click", ()=>{
    haptic("selection"); navigate("product",{id:c.dataset.id});
  }));

  attachScroll();
}

function productCard(p, sup){
  const photo = p.mainPhoto || (p.photos&&p.photos[0]) || null;
  const rating = p.reviewRating>0 ? `<span class="badge-rating">★ ${p.reviewRating}</span>` : "";
  const count  = (p.photos&&p.photos.length>1) ? `<span class="badge-count">⊞ ${p.photos.length}</span>` : "";
  return `<div class="pcard" data-id="${p.id}">
    <div class="thumb">
      ${photo ? `<img src="${photo}" loading="lazy" alt="">` : `<div class="noimg">📦</div>`}
      ${count}${rating}
      ${p.category?`<span class="badge-cat">${esc(catShort(p.category))}</span>`:""}
    </div>
    <div class="body">
      <div class="price">${p.price?esc(p.price)+" "+esc(p.currency||"$"):"—"}</div>
      ${p.size?`<div class="meta" dir="ltr">${esc(p.size)}</div>`:""}
      <div class="meta">${esc((sup&&sup.name)||"ספק")}</div>
    </div>
  </div>`;
}

async function renderReview(){
  setNavbar({title:"ביקורת ערב", large:true});
  const app = byId("app");
  const all = (await idb.all("products")).sort((a,b)=>a.dateAdded-b.dateAdded);
  const unrated = all.filter(p=>!p.reviewRating);
  const suppliers = await idb.all("suppliers");
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));

  if (all.length===0){
    app.innerHTML = `<div class="empty">
      <div class="em-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2.5l2.95 6.18 6.55.85-4.84 4.65 1.23 6.66L12 17.6l-5.89 3.24 1.23-6.66L2.5 9.53l6.55-.85L12 2.5z"/></svg>
      </div>
      <h2>אין מוצרים לביקורת</h2>
      <p>אחרי שתאסוף מוצרים, חזור לכאן בערב לדרג אותם.</p>
    </div>`;
    return;
  }
  if (unrated.length===0){
    app.innerHTML = `<div class="empty">
      <div class="em-icon green" style="background:rgba(52,199,89,0.18);color:var(--systemGreen)">
        <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
      </div>
      <h2>הכל דורג!</h2>
      <p>${all.length} מוצרים דורגו. ראה תובנות בסיכום.</p>
      <button class="btn" onclick="navigate('summary')">צפה בסיכום</button>
    </div>`;
    return;
  }

  let idx = 0;
  function show(){
    const p = unrated[idx];
    if (!p){ renderReview(); return; }
    const sup = supMap[p.supplierId];
    const photo = p.mainPhoto || (p.photos&&p.photos[0]);
    const pct = Math.round((idx/unrated.length)*100);
    app.innerHTML = `
      <div class="review-progress"><span>${idx+1} מתוך ${unrated.length}</span><span>${esc((sup&&sup.name)||"")}</span></div>
      <div class="review-progress-bar"><div style="width:${pct}%"></div></div>

      <div class="review-card" id="rcard">
        <div class="review-img" id="rimg">
          ${photo?`<img src="${photo}">`:`<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#444;font-size:48px">📦</div>`}
        </div>
        <div class="review-info">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px">
            <div style="font-size:20px;font-weight:700;letter-spacing:-0.013em">${p.price?esc(p.price)+" "+esc(p.currency||""):"ללא מחיר"}</div>
            <span class="pill">${esc(catShort(p.category))}</span>
          </div>
          <div class="muted" dir="auto">${esc(p.size||"")} ${p.size&&sup?" · ":""} ${esc((sup&&sup.name)||"")}</div>
          ${p.notes?`<div style="margin-top:10px;font-size:15px;line-height:20px">${nl2br(p.notes)}</div>`:""}
        </div>
      </div>

      <div class="rating-big" id="rb">
        ${[1,2,3,4,5].map(n=>`<button data-n="${n}">${n}</button>`).join("")}
      </div>
      <div class="list-section">
        <div class="list"><div class="form-row full">
          <textarea class="ftext" id="rn" placeholder="הערות (אופציונלי)..."></textarea>
        </div></div>
      </div>
      <div class="btn-stack">
        <button class="btn tinted" id="skip">דלג ➝</button>
        <button class="btn gray" id="open">פתח מוצר</button>
      </div>
      <div class="spacer-40"></div>
    `;

    // swipe gestures
    const card = $("#rcard");
    let startX=null, dx=0;
    card.addEventListener("touchstart", e=>{ startX = e.touches[0].clientX; dx=0; }, {passive:true});
    card.addEventListener("touchmove", e=>{
      if (startX===null) return;
      dx = e.touches[0].clientX - startX;
      card.style.transform = `translateX(${dx}px) rotate(${dx/30}deg)`;
      card.style.opacity = String(1 - Math.min(1, Math.abs(dx)/300));
    }, {passive:true});
    card.addEventListener("touchend", async ()=>{
      if (startX===null) return;
      if (Math.abs(dx)>120){
        // swipe = quick rate (left = 2★, right = 4★ — fast triage)
        const n = dx>0 ? 4 : 2;
        haptic("success");
        card.classList.add(dx>0?"swipe-right":"swipe-left");
        p.reviewRating = n; p.reviewNotes = $("#rn").value.trim();
        await idb.put("products", p);
        toast(`★${n}`);
        setTimeout(()=>{ idx++; show(); }, 250);
      } else {
        card.style.transform = "";
        card.style.opacity = "";
      }
      startX = null;
    });

    $$("#rb button").forEach(b=>b.addEventListener("click", async ()=>{
      const n = +b.dataset.n;
      haptic("success");
      p.reviewRating = n; p.reviewNotes = $("#rn").value.trim();
      await idb.put("products", p);
      toast(`★${n}`);
      idx++; show();
    }));
    $("#skip").addEventListener("click", ()=>{ haptic("selection"); idx++; show(); });
    $("#open").addEventListener("click", ()=>navigate("product",{id:p.id}));
  }
  show();
  attachScroll();
}

async function renderSummary(){
  setNavbar({
    title:"סיכום", large:true,
    actions:[{label:"⚙", onClick:()=>navigate("settings")}]
  });
  const app = byId("app");
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));

  const rated = products.filter(p=>p.reviewRating>0);
  const top = [...products].filter(p=>p.reviewRating>=4).sort((a,b)=>b.reviewRating-a.reviewRating).slice(0,8);
  const todayP = products.filter(p=>isToday(p.dateAdded));
  const byCat = {};
  products.forEach(p=>{ byCat[p.category||"other"] = (byCat[p.category||"other"]||0)+1; });

  const supScores = suppliers.map(s=>{
    const ps = products.filter(p=>p.supplierId===s.id);
    return {sup:s, prods:ps, score: supplierScore(ps)};
  });
  const orderRank = {"Priority Supplier":4,"Strong Supplier":3,"Interesting":2,"Low Interest":1,"No Products":0};
  const best = [...supScores].sort((a,b)=>{
    const ra = orderRank[a.score.label]||0, rb = orderRank[b.score.label]||0;
    if (rb!==ra) return rb-ra;
    return b.score.avg - a.score.avg;
  }).filter(x=>x.score.total>0).slice(0,10);

  app.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="num">${products.length}</div><div class="lab">מוצרים</div></div>

   EXPORTS
   ============================================================ */
function downloadFile(filename, content, mime="application/json"){
  const blob = (content instanceof Blob) ? content : new Blob([content],{type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
async function exportJSON(){
  const [suppliers,products,sessions] = await Promise.all([idb.all("suppliers"),idb.all("products"),idb.all("sessions")]);
  const stamp = new Date().toISOString().slice(0,10);
  downloadFile(`tradefair-${stamp}.json`, JSON.stringify({version:1, exportedAt:Date.now(), suppliers, products, sessions}, null, 2));
  haptic("success"); toast("יוצא ✓");
}
async function exportCSV(){
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));
  const q = v => `"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const rows = [["Supplier","Booth","Country","Phone","Email","Product","Category","Price","Currency","Size","Rating","Notes","Review Notes","Date"].map(q).join(",")];
  products.forEach(p=>{
    const s = supMap[p.supplierId]||{};
    rows.push([s.name||"", s.boothNumber||"", s.country||"", s.phone||"", s.email||"", p.name||"", catShort(p.category), p.price||"", p.currency||"", p.size||"", p.reviewRating||"", p.notes||"", p.reviewNotes||"", new Date(p.dateAdded).toISOString()].map(q).join(","));
  });
  const stamp = new Date().toISOString().slice(0,10);
  downloadFile(`tradefair-${stamp}.csv`, "\uFEFF"+rows.join("\n"), "text/csv");
  haptic("success"); toast("יוצא ✓");
}
async function exportSummary(){
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));
  const lines = [];
  lines.push("Trade Fair Summary");
  lines.push("==================");
  lines.push(`Date: ${new Date().toLocaleDateString()}`);
  lines.push(`Products: ${products.length}  |  Suppliers: ${suppliers.length}`);
  lines.push("");
  const supScores = suppliers.map(s=>{
    const ps = products.filter(p=>p.supplierId===s.id);
    return {sup:s, prods:ps, score: supplierScore(ps)};
  }).filter(x=>x.score.total>0).sort((a,b)=>b.score.avg-a.score.avg);

  lines.push("-- Priority Suppliers --");
  supScores.filter(x=>x.score.label==="Priority Supplier").forEach(x=>{
    lines.push(`★ ${x.sup.name||"-"} – ${x.prods.length} products, avg ${x.score.avg.toFixed(1)}, ${x.score.strong} strong`);
    if (x.sup.boothNumber) lines.push(`  Booth: ${x.sup.boothNumber}`);
    if (x.sup.phone) lines.push(`  Phone: ${x.sup.phone}`);
    if (x.sup.email) lines.push(`  Email: ${x.sup.email}`);
  });
  lines.push("");
  lines.push("-- Strong Suppliers --");
  supScores.filter(x=>x.score.label==="Strong Supplier").forEach(x=>{
    lines.push(`• ${x.sup.name||"-"} – ${x.prods.length} products, avg ${x.score.avg.toFixed(1)}`);
  });
  lines.push("");
  lines.push("-- Top Products (★4+) --");
  products.filter(p=>p.reviewRating>=4).sort((a,b)=>b.reviewRating-a.reviewRating).forEach(p=>{
    const s = supMap[p.supplierId];
    lines.push(`★${p.reviewRating}  ${p.name||catShort(p.category)}  ${p.price||""} ${p.currency||""}  –  ${(s&&s.name)||""}`);
    if (p.size) lines.push(`       size: ${p.size}`);
    if (p.notes) lines.push(`       ${p.notes}`);
  });

  const stamp = new Date().toISOString().slice(0,10);
  downloadFile(`tradefair-summary-${stamp}.txt`, lines.join("\n"), "text/plain");
  haptic("success"); toast("יוצא ✓");
}
async function exportXLSX(){
  if (!window.ExcelJS){ alert("טעינת ספריית Excel נכשלה. דרושה התחברות לאינטרנט פעם ראשונה."); return; }
  toast("בונה Excel...");
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));

  const wb = new ExcelJS.Workbook();
  wb.creator = "Trade Fair Capture";
  wb.created = new Date();

  const ws = wb.addWorksheet("Products", { views:[{rightToLeft:true}] });
  ws.addRow(["#","Photo","Supplier","Booth","Country","Product","Category","Price","Currency","Size","Rating","Notes","Review Notes","Date"]);
  const hr = ws.getRow(1);
  hr.font={bold:true,color:{argb:"FFFFFFFF"}}; hr.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0F172A"}}; hr.height=26;
  hr.alignment={vertical:"middle",horizontal:"center"};
  ws.columns=[{width:5},{width:18},{width:24},{width:9},{width:12},{width:24},{width:14},{width:10},{width:9},{width:14},{width:8},{width:36},{width:30},{width:14}];

  const sorted = [...products].sort((a,b)=>{
    const sa=(supMap[a.supplierId]||{}).name||"";
    const sb=(supMap[b.supplierId]||{}).name||"";
    if (sa!==sb) return sa.localeCompare(sb);
    return a.dateAdded-b.dateAdded;
  });
  for (let i=0;i<sorted.length;i++){
    const p=sorted[i];
    const s=supMap[p.supplierId]||{};
    const r=ws.addRow([i+1,"",s.name||"",s.boothNumber||"",s.country||"",p.name||"",catShort(p.category),p.price||"",p.currency||"",p.size||"",p.reviewRating||"",p.notes||"",p.reviewNotes||"",new Date(p.dateAdded).toLocaleString("he-IL")]);
    r.height=95; r.alignment={vertical:"middle",wrapText:true};
    if (i%2===1) r.eachCell(c=>c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF7F7F6"}});
    if (p.reviewRating>=4){ r.getCell(11).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFDCFCE7"}}; r.getCell(11).font={bold:true,color:{argb:"FF166534"}}; }
    const photo = p.mainPhoto||(p.photos&&p.photos[0]);
    if (photo){
      try{
        const m = photo.match(/^data:image\/(\w+);base64,(.+)$/);
        if (m){
          const ext=(m[1]==="jpg"?"jpeg":m[1]).toLowerCase();
          const id=wb.addImage({base64:m[2],extension:ext});
          ws.addImage(id,{tl:{col:1.05,row:r.number-1+0.05},ext:{width:120,height:120},editAs:"oneCell"});
        }
      }catch(e){}
    }
  }
  ws.views=[{state:"frozen",ySplit:1,rightToLeft:true}];

  const ws2 = wb.addWorksheet("Suppliers",{views:[{rightToLeft:true}]});
  ws2.addRow(["#","Card","Supplier","Contact","Phone","Email","Booth","Country","Products","Avg","Strong","Priority","Notes","Date"]);
  const hr2=ws2.getRow(1); hr2.font={bold:true,color:{argb:"FFFFFFFF"}}; hr2.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0F172A"}}; hr2.height=26;
  hr2.alignment={vertical:"middle",horizontal:"center"};
  ws2.columns=[{width:5},{width:24},{width:22},{width:18},{width:18},{width:24},{width:9},{width:12},{width:10},{width:8},{width:9},{width:18},{width:32},{width:14}];

  const supSorted = suppliers.slice().sort((a,b)=>(b.dateAdded||0)-(a.dateAdded||0));
  for (let i=0;i<supSorted.length;i++){
    const s=supSorted[i];
    const ps=products.filter(p=>p.supplierId===s.id);
    const sc=supplierScore(ps);
    const r=ws2.addRow([i+1,"",s.name||"",s.contactPerson||"",s.phone||"",s.email||"",s.boothNumber||"",s.country||"",ps.length,sc.avg?Number(sc.avg.toFixed(2)):"",sc.strong||"",sc.label,s.notes||"",new Date(s.dateAdded).toLocaleDateString("he-IL")]);
    r.height=110; r.alignment={vertical:"middle",wrapText:true};
    if (i%2===1) r.eachCell(c=>c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF7F7F6"}});
    if (sc.label==="Priority Supplier"){ r.getCell(12).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0F172A"}}; r.getCell(12).font={bold:true,color:{argb:"FFFFFFFF"}}; }
    else if (sc.label==="Strong Supplier"){ r.getCell(12).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFDCFCE7"}}; r.getCell(12).font={bold:true,color:{argb:"FF166534"}}; }
    if (s.businessCard){
      try{
        const m = s.businessCard.match(/^data:image\/(\w+);base64,(.+)$/);
        if (m){
          const ext=(m[1]==="jpg"?"jpeg":m[1]).toLowerCase();
          const id=wb.addImage({base64:m[2],extension:ext});
          ws2.addImage(id,{tl:{col:1.05,row:r.number-1+0.05},ext:{width:160,height:130},editAs:"oneCell"});
        }
      }catch(e){}
    }
  }
  ws2.views=[{state:"frozen",ySplit:1,rightToLeft:true}];

  const ws3 = wb.addWorksheet("All Photos",{views:[{rightToLeft:true}]});
  ws3.addRow(["#","Photo","Supplier","Product","Category","Price","Size","Rating"]);
  const hr3=ws3.getRow(1); hr3.font={bold:true,color:{argb:"FFFFFFFF"}}; hr3.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0F172A"}}; hr3.height=26;
  ws3.columns=[{width:5},{width:18},{width:22},{width:22},{width:14},{width:10},{width:14},{width:8}];
  let n=0;
  for (const p of sorted){
    const sup=supMap[p.supplierId]||{};
    const phs = (p.photos&&p.photos.length)?p.photos:(p.mainPhoto?[p.mainPhoto]:[]);
    for (const photo of phs){
      n++;
      const r=ws3.addRow([n,"",sup.name||"",p.name||catShort(p.category),catShort(p.category),p.price?p.price+" "+(p.currency||""):"",p.size||"",p.reviewRating||""]);
      r.height=95; r.alignment={vertical:"middle",wrapText:true};
      try{
        const m = photo.match(/^data:image\/(\w+);base64,(.+)$/);
        if (m){
          const ext=(m[1]==="jpg"?"jpeg":m[1]).toLowerCase();
          const id=wb.addImage({base64:m[2],extension:ext});
          ws3.addImage(id,{tl:{col:1.05,row:r.number-1+0.05},ext:{width:120,height:120},editAs:"oneCell"});
        }
      }catch(e){}
    }
  }
  ws3.views=[{state:"frozen",ySplit:1,rightToLeft:true}];

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const stamp = new Date().toISOString().slice(0,10);
  downloadFile(`tradefair-${stamp}.xlsx`, blob);
  haptic("success"); toast("Excel נוצר ✓");
}

function importJSON(){
  const inp = document.createElement("input");
  inp.type="file"; inp.accept=".json,application/json";
  inp.onchange = async ()=>{
    const f = inp.files[0]; if(!f) return;
    try{
      const d = JSON.parse(await f.text());
      if (!d.products && !d.suppliers){ alert("קובץ לא תקין"); return; }
      if (!await confirmSheet("ייבוא יוסיף/יעדכן נתונים. להמשיך?","ייבא")) return;
      for (const s of (d.suppliers||[])) await idb.put("suppliers", s);
      for (const p of (d.products||[])) await idb.put("products", p);
      for (const ss of (d.sessions||[])) await idb.put("sessions", ss);
      haptic("success"); toast("יובא ✓"); render();
    }catch(err){ alert("שגיאה: "+err.message); }
  };
  inp.click();
}

let lastTouch = 0;
document.addEventListener("touchend", e=>{
  const now = Date.now();
  if (now - lastTouch <= 300) e.preventDefault();
  lastTouch = now;
}, {passive:false});
