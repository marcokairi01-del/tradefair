async function renderBanner(){
  const host = byId("banner-host");
  const root = byId("app-root");
  if (!State.activeSessionId){ host.innerHTML=""; root.classList.remove("has-banner"); return; }
  const s = await idb.get("sessions", State.activeSessionId);
  if (!s){ host.innerHTML=""; root.classList.remove("has-banner"); return; }
  const sup = s.supplierId ? await idb.get("suppliers", s.supplierId) : null;
  const products = (await idb.all("products")).filter(p=>p.supplierId===s.supplierId);

  host.innerHTML = `<div class="banner">
    <div style="flex:1;min-width:0;overflow:hidden">
      <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📍 ${esc((sup&&sup.name)||"ספק ללא שם")}</div>
      <div class="banner-meta">${products.length} מוצרים בסשן זה</div>
    </div>
    <div class="banner-actions">
      <button data-act="add">+ מוצר</button>
      <button data-act="end">סיום</button>
    </div>
  </div>`;
  root.classList.add("has-banner");
  host.querySelector('[data-act="add"]').addEventListener("click", ()=>{ haptic("selection"); navigate("addProduct",{id:s.supplierId}); });
  host.querySelector('[data-act="end"]').addEventListener("click", endSession);
}

async function endSession(){
  if (State.activeSessionId){
    const s = await idb.get("sessions", State.activeSessionId);
    if (s){
      const prods = (await idb.all("products")).filter(p=>p.supplierId===s.supplierId);
      s.productCount = prods.length;
      s.endedAt = Date.now();
      await idb.put("sessions", s);
    }
  }
  await setActiveSession(null);
  haptic("success");
  toast("הסשן הסתיים");
  render();
}

/* ============================================================
   Tab + scroll handling
   ============================================================ */
function setActiveTab(name){
  $$(".tab", byId("tabbar")).forEach(b=>{
    const map = {gallery:"gallery", suppliers:"suppliers", capture:"capture", review:"review", summary:"summary"};
    const aliases = {
      gallery:["gallery","product"],
      suppliers:["suppliers","supplier"],
      capture:["capture","session","addProduct"],
      review:["review"],
      summary:["summary","settings"]
    };
    b.classList.toggle("active", aliases[b.dataset.tab].includes(name));
  });
}

/* Scroll detection for nav border / large title collapse */
let scrollEl = null;
function attachScroll(){
  document.removeEventListener("scroll", onScroll, true);
  document.addEventListener("scroll", onScroll, {passive:true,capture:true});
  onScroll();
}
function onScroll(){
  const sc = window.scrollY || document.documentElement.scrollTop;
  byId("app-root").classList.toggle("scrolled", sc>4);
  byId("navbar").classList.toggle("scrolled", sc>4);
}
window.addEventListener("scroll", onScroll, {passive:true});

/* ============================================================
   Main render dispatch
   ============================================================ */
async function render(){
  const {name, params} = CURRENT_ROUTE;
  setActiveTab(name);
  await renderBanner();
  const app = byId("app");
  app.classList.remove("page-back");
  app.classList.add("page");

  switch(name){
    case "gallery":   return renderGallery();
    case "suppliers": return renderSuppliersList();
    case "capture":   return renderCaptureHub();
    case "session":   return renderSessionStart();
    case "addProduct":return renderAddProduct(params.id);
    case "product":   return renderProduct(params.id);
    case "supplier":  return renderSupplier(params.id);
    case "review":    return renderReview();
    case "summary":   return renderSummary();
    case "settings":  return renderSettings();
    default:          return renderGallery();
  }
}

/* ============================================================
   Action sheet helper
   ============================================================ */
function actionSheet({title, actions, cancel="ביטול"}){
  return new Promise(resolve=>{
    const wrap = document.createElement("div");
    wrap.className = "sheet-bg";
    const titleHtml = title ? `<div class="sheet-title">${esc(title)}</div>` : "";
    wrap.innerHTML = `
      <div class="sheet">
        ${titleHtml}
        ${actions.map((a,i)=>`<button class="sheet-action ${a.destructive?'destructive':''} ${a.bold?'bold':''}" data-i="${i}">${esc(a.label)}</button>`).join("")}
      </div>
      <button class="sheet-cancel" id="sh-cancel">${esc(cancel)}</button>
    `;
    document.body.appendChild(wrap);
    const close = (val)=>{ wrap.remove(); resolve(val); };
    wrap.addEventListener("click", e=>{ if (e.target===wrap) close(null); });
    $$(".sheet-action", wrap).forEach(b=>b.addEventListener("click", ()=>{
      haptic("selection");
      close(actions[+b.dataset.i].value);
    }));
    $("#sh-cancel", wrap).addEventListener("click", ()=>close(null));
  });
}

async function confirmSheet(message, confirmLabel="אישור", destructive=false){
  const r = await actionSheet({
    title: message,
    actions: [ { label: confirmLabel, value: true, destructive, bold:true } ],
  });
  return !!r;
}

/* ============================================================
   GALLERY
   ============================================================ */
async function renderGallery(){
  setNavbar({
    title: "מוצרים",
    large: true,
    actions: [
      { label: "+ ספק", bold:true, onClick: ()=>navigate("session") }
    ]
  });

  const app = byId("app");
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));
  const f = State.filters;

  // filter
  let filtered = [...products].sort((a,b)=>b.dateAdded-a.dateAdded);
  if (f.period==="today")  filtered = filtered.filter(p=>isToday(p.dateAdded));
  if (f.cat!=="all")       filtered = filtered.filter(p=>p.category===f.cat);
  if (f.supplierId)        filtered = filtered.filter(p=>p.supplierId===f.supplierId);
  if (f.ratedOnly)         filtered = filtered.filter(p=>p.reviewRating>0);
  if (f.topOnly)           filtered = filtered.filter(p=>p.reviewRating>=4);
  if (f.q){
    const q = f.q.toLowerCase();
    filtered = filtered.filter(p=>{
      const sup = supMap[p.supplierId];
      return (p.name||"").toLowerCase().includes(q) ||
             (p.notes||"").toLowerCase().includes(q) ||
             (p.size||"").toLowerCase().includes(q) ||
             (p.price||"").toLowerCase().includes(q) ||
             (sup&&(sup.name||"").toLowerCase().includes(q));
    });
  }

  const supplierChip = f.supplierId ? `<button class="chip" aria-pressed="true" data-clear="supplierId">${esc((supMap[f.supplierId]||{}).name||"ספק")} ✕</button>`:"";

  app.innerHTML = `
    <div class="search-wrap">
      <div class="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="חיפוש מוצר, ספק, הערה..." value="${esc(f.q||"")}" autocomplete="off">
      </div>
    </div>

    <div class="segmented">
      <button data-seg="all"   aria-pressed="${f.period==='all'}">הכל</button>
      <button data-seg="today" aria-pressed="${f.period==='today'}">היום</button>
      <button data-seg="rated" aria-pressed="${f.ratedOnly && !f.topOnly}">מדורגים</button>
      <button data-seg="top"   aria-pressed="${f.topOnly}">★ מעולים</button>
    </div>

    <div class="chip-row">
      ${supplierChip}
      ${f.cat!=="all" ? `<button class="chip" aria-pressed="true" data-clear="cat">${esc(catShort(f.cat))} ✕</button>` :
         CATEGORIES.map(c=>`<button class="chip" data-cat="${c.id}" aria-pressed="false">${esc(catShort(c.id))}</button>`).join("")}
    </div>

    ${filtered.length===0 ? renderEmptyState(products.length===0, f) : `
      <div class="muted padded" style="padding-bottom:8px">${filtered.length} ${filtered.length===1?"מוצר":"מוצרים"}</div>
      <div class="grid" id="grid">
        ${filtered.map(p=>productCard(p, supMap[p.supplierId])).join("")}
      </div>
    `}
    <div class="spacer-40"></div>
  `;

  // search input — debounced
  let toid;
  $("#q").addEventListener("input", e=>{
    clearTimeout(toid);
    const v = e.target.value;
    toid = setTimeout(()=>{ f.q = v; renderGallery(); }, 250);
  });
  // segmented
  $$("[data-seg]", app).forEach(b=>b.addEventListener("click", ()=>{
    const v = b.dataset.seg;
    haptic("selection");
    if (v==="all"){ f.period="all"; f.ratedOnly=false; f.topOnly=false; }
    else if (v==="today"){ f.period= f.period==="today"?"all":"today"; }
    else if (v==="rated"){ f.ratedOnly = !f.ratedOnly; if(f.ratedOnly) f.topOnly=false; }
    else if (v==="top"){ f.topOnly = !f.topOnly; if(f.topOnly) f.ratedOnly=false; }
    renderGallery();
  }));
  // chips
  $$("[data-cat]", app).forEach(b=>b.addEventListener("click", ()=>{
    haptic("selection");
    f.cat = b.dataset.cat; renderGallery();
  }));
  $$("[data-clear]", app).forEach(b=>b.addEventListener("click", ()=>{
    haptic("selection");
    if (b.dataset.clear==="cat") f.cat="all";
    if (b.dataset.clear==="supplierId") f.supplierId=null;
    renderGallery();
  }));
  // product cards
  $$(".pcard", app).forEach(c=>c.addEventListener("click", ()=>{
    haptic("selection"); navigate("product",{id:c.dataset.id});
  }));

  attachScroll();
}

function productCard(p, sup){
  const photo = p.mainPhoto || (p.photos&&p.photos[0]) || null;
  const rating = p.reviewRating>0 ? `<span class="badge-rating">★ ${p.reviewRating}</span>` : "";
  const count  = (p.photos&&p.photos.length>1) ? `<span class="badge-count">⊞ ${p.photos.length}</span>` : "";
  const ordered = p.orderQty>0 ? `<span class="badge-order">×${p.orderQty}</span>` : "";
  const isDraft = p.status==="draft";
  const draftBadge = isDraft ? `<span class="badge-draft">טיוטה</span>` : "";
  return `<div class="pcard ${p.orderQty>0?'has-order':''} ${isDraft?'is-draft':''}" data-id="${p.id}">
    <div class="thumb">
      ${photo ? `<img src="${photo}" loading="lazy" alt="">` : `<div class="noimg">📦</div>`}
      ${count}${rating}${ordered}${draftBadge}
      ${p.category?`<span class="badge-cat">${esc(catShort(p.category))}</span>`:""}
    </div>
    <div class="body">
      <div class="price">${p.price?esc(p.price)+" "+esc(p.currency||"$")+(p.priceUnit&&p.priceUnit!=="pcs"?` <span class="unit">/${PRICE_UNIT_ABBR(p.priceUnit)}</span>`:""):(isDraft?"<span class=\"meta\" style=\"font-style:italic\">להשלים פרטים</span>":"—")}</div>
      ${p.size?`<div class="meta" dir="ltr">${esc(p.size)}</div>`:""}
      <div class="meta">${esc((sup&&sup.name)||"ספק")}</div>
    </div>
  </div>`;
}

/* ============================================================
   SUPPLIERS LIST
   ============================================================ */
async function renderSuppliersList(){
  let selectMode = false;
  const selected = new Set();

  function buildNavbar(){
    if (selectMode){
      setNavbar({
        title: `נבחרו ${selected.size}`, large:false,
        actions:[{label:"סיום", bold:true, onClick:()=>{ selectMode=false; selected.clear(); paint(); }}]
      });
    } else {
      setNavbar({
        title:"ספקים", large:true,
        actions:[
          {label:"בחר", onClick:()=>{ selectMode=true; paint(); }},
          {label:"+ חדש", bold:true, onClick:()=>navigate("session")}
        ]
      });
    }
  }

  const app = byId("app");
  const [suppliers, products] = await Promise.all([idb.all("suppliers"), idb.all("products")]);
  const byS = {};
  products.forEach(p=>{(byS[p.supplierId]=byS[p.supplierId]||[]).push(p)});
  suppliers.sort((a,b)=>b.dateAdded-a.dateAdded);

  if (suppliers.length===0){
    setNavbar({title:"ספקים", large:true, actions:[{label:"+ חדש", bold:true, onClick:()=>navigate("session")}]});
    app.innerHTML = `<div class="empty">
      <div class="em-icon">
        <svg viewBox="0 0 24 24"><path d="M3 21v-1.5a4.5 4.5 0 0 1 4.5-4.5h9a4.5 4.5 0 0 1 4.5 4.5V21"/><circle cx="12" cy="7.5" r="4"/></svg>
      </div>
      <h2>אין ספקים עדיין</h2>
      <p>התחל סשן חדש כדי לאסוף ספק וכרטיס ביקור.</p>
      <button class="btn" onclick="navigate('session')">+ ספק חדש</button>
    </div>`;
    return;
  }

  function paint(){
    buildNavbar();
    const selectBar = selectMode ? `
      <div class="select-bar">
        <div class="sb-count">נבחרו <em>${selected.size}</em> מתוך ${suppliers.length}</div>
        <div class="sb-actions">
          <button id="sb-all">בחר הכל</button>
          <button id="sb-pdf" class="primary" ${selected.size===0?"disabled":""}>ייצא PDF</button>
        </div>
      </div>` : "";

    const rowClass = selectMode ? "supplier-row selectable" : "supplier-row";
    const wrapClass = selectMode ? "list" : "list";

    app.innerHTML = `
      ${selectBar}
      <div class="list-section">
        <div class="supplier-list-grid">
          ${suppliers.map(s=>{
            const prods = byS[s.id]||[];
            const score = supplierScore(prods);
            const initial = (s.name||"?").trim().charAt(0).toUpperCase();
            const isChecked = selected.has(s.id);
            return `<div class="${rowClass}${isChecked?' checked':''}" data-id="${s.id}" style="cursor:pointer">
              <div class="savatar">${s.businessCard?`<img src="${s.businessCard}">`:esc(initial)}</div>
              <div class="sinfo">
                <div class="sname">${esc(s.name||"ללא שם")}</div>
                <div class="smeta">
                  <span>${prods.length} מוצרים</span>
                  ${score.strong>0?`<span>★ ${score.strong} חזקים</span>`:""}
                  ${s.boothNumber?`<span>ביתן ${esc(s.boothNumber)}</span>`:""}
                </div>
              </div>
              <span class="pill ${score.tone}">${esc(score.label)}</span>
              ${selectMode?`<div class="sb-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 7"/></svg></div>`:""}
            </div>`;
          }).join("")}
        </div>
      </div>
      <div class="spacer-40"></div>
    `;

    $$(".supplier-row", app).forEach(r=>r.addEventListener("click", ()=>{
      const id = r.dataset.id;
      if (selectMode){
        haptic("selection");
        if (selected.has(id)) selected.delete(id); else selected.add(id);
        paint();
      } else {
        haptic("selection"); navigate("supplier",{id});
      }
    }));

    if (selectMode){
      const btnAll = byId("sb-all");
      const btnPdf = byId("sb-pdf");
      btnAll && btnAll.addEventListener("click", ()=>{
        if (selected.size === suppliers.length) selected.clear();
        else suppliers.forEach(s=>selected.add(s.id));
        paint();
      });
      btnPdf && btnPdf.addEventListener("click", async ()=>{
        if (selected.size === 0) return;
        const list = suppliers.filter(s=>selected.has(s.id));
        await exportSuppliersPDFs(list);
      });
    }
    attachScroll();
  }
  paint();
}

          <span>סרוק כרטיס ביקור</span>
        </div>
        <input type="file" accept="image/*" capture="environment" id="card-input">
      </div>
      <div class="list-section-footer">אופציונלי. צלם את הכרטיס וגרור את 4 הפינות ליישור.</div>

      </div>

    <div class="btn-stack">
      <button class="btn" id="start-btn">+ התחל והוסף מוצר ראשון</button>
      <button class="btn tinted" id="save-only">שמור ספק בלבד</button>
    </div>
    <div class="spacer-40"></div>
  `;

  let cardImg = null;
  const emptyCardHTML = `
    <div class="add-block">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
        <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
        <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <path d="M7 12h10"/>
      </svg>
      <span>סרוק כרטיס ביקור</span>
    </div>
    <input type="file" accept="image/*" capture="environment" id="card-input">
  `;
  function bindCardSlot(){
    const slot = $("#card-slot"), inp = $("#card-input");
    inp.addEventListener("change", async e=>{
      const f = e.target.files[0];
      if (!f) return;
      /* Reset input so re-selecting same file fires change */
      try { inp.value = ""; } catch(_){}
      const scanned = await scanDocument(f);
      if (!scanned){
        /* Cancelled — keep slot empty */
        return;
      }
      cardImg = scanned;
      slot.classList.add("has");
      slot.innerHTML = `
        <img src="${cardImg}">
        <div class="card-ocr-badge" id="card-ocr-badge">קורא טקסט…</div>
        <button class="remove-x" id="card-rm" type="button"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
        <input type="file" accept="image/*" capture="environment" id="card-input">
      `;
      $("#card-rm").addEventListener("click", e=>{
        e.preventDefault(); e.stopPropagation();
        cardImg = null;
        slot.classList.remove("has");
        slot.innerHTML = emptyCardHTML;
        bindCardSlot();
      });
      bindCardSlot();
      /* Run OCR in background; only fill empty fields so we never overwrite user input */
      ocrBusinessCard(cardImg).then(parsed=>{
        const badge = $("#card-ocr-badge");
        if (!parsed || (!parsed.name && !parsed.contact && !parsed.phone && !parsed.email)){
          if (badge) badge.remove();
          return;
        }
        const filled = [];
        const setIfEmpty = (id, val, label)=>{
          if (!val) return;
          const el = $(id);
          if (el && !el.value.trim()){ el.value = val; filled.push(label); }
        };
        setIfEmpty("#f-name",    parsed.name,    "שם");
        setIfEmpty("#f-contact", parsed.contact, "איש קשר");
        setIfEmpty("#f-phone",   parsed.phone,   "טלפון");
        setIfEmpty("#f-email",   parsed.email,   "אימייל");
        if (badge){
          if (filled.length){
            badge.textContent = "מולא: "+filled.join(" · ");
            badge.classList.add("ok");
            setTimeout(()=>badge.remove(), 4000);
          } else {
            badge.remove();
          }
        }
        if (filled.length) haptic("success");
      }).catch(()=>{
        const badge = $("#card-ocr-badge"); if (badge) badge.remove();
      });
    });
  }
  bindCardSlot();

  async function doSave(startProducts){
    haptic("success");
    const sup = {
      id: uid(),
      name: $("#f-name").value.trim(),
      contactPerson: $("#f-contact").value.trim(),
      phone: $("#f-phone").value.trim(),
      email: $("#f-email").value.trim(),
      boothNumber: $("#f-booth").value.trim(),
      country: $("#f-country").value.trim(),
      businessCard: cardImg,
      notes: $("#f-notes").value.trim(),
      dateAdded: Date.now(),
    };
    await idb.put("suppliers", sup);
    const sess = { id:uid(), supplierId:sup.id, dateAdded:Date.now(), productCount:0, notes:"" };
    await idb.put("sessions", sess);
    await setActiveSession(sess.id);
    toast("ספק נשמר");
    if (startProducts) navigate("addProduct",{id:sup.id});
    else navigate("supplier",{id:sup.id});
  }
  $("#start-btn").addEventListener("click", ()=>doSave(true));
  $("#save-only").addEventListener("click", ()=>doSave(false));
  attachScroll();
}

  function drawPhotos(){
    $("#photos").innerHTML = photos.map((p,i)=>{

        ${i===0?'<span class="main-flag">ראשי</span>':''}

      return `<div class="photo-slot" data-i="${i}">

      </div>`;

    $$("#photos input[type=file]").forEach(inp=>{
      inp.addEventListener("change", async e=>{
        const i = +inp.dataset.i;

  drawPhotos();

  let userTouchedUnit = !!sup.defaultPriceUnit;
  $("#f-unit")?.addEventListener("change", ()=>{ userTouchedUnit = true; });

    const sel = $("#f-unit");

    const clean = photos.filter(Boolean);
    const cat = $("#f-cat").value;
    const unit = $("#f-unit").value;
    const cur = $("#f-cur").value;
    const p = {
      id: uid(),
      supplierId: sup.id,
      dateAdded: Date.now(),
      photos: clean,
      mainPhoto: clean[0]||null,
      category: cat,
      priceUnit: unit,
      name: $("#f-name").value.trim(),
      size: $("#f-size").value.trim(),
      price: $("#f-price").value.trim(),
      currency: cur,
      notes: $("#f-notes").value.trim(),
      reviewRating: 0,
      reviewNotes: "",
      orderQty: 0,
      orderPrice: "",
      orderColors: 1,
      status:"captured",
    };
    await idb.put("products", p);

    /* Learn defaults on supplier — only set on first product per field */
    let dirty = false;
    if (!sup.defaultCategory)  { sup.defaultCategory = cat; dirty = true; }
    if (!sup.defaultPriceUnit) { sup.defaultPriceUnit = unit; dirty = true; }
    if (!sup.defaultCurrency)  { sup.defaultCurrency = cur; dirty = true; }
    if (dirty) await idb.put("suppliers", sup);

    /* Learn today's defaults — applied to brand new suppliers */
    await setDailyDefaults({ lastCategory:cat, lastPriceUnit:unit, lastCurrency:cur });

    return p;
  }

  async function doSave(after){
    await saveOne();
    haptic("success");
    toast("נשמר");
    if (after==="new")  return navigate("addProduct",{id:sup.id});

  }

  $("#save-back").addEventListener("click", ()=>doSave("back"));
  $("#save-end").addEventListener("click", ()=>doSave("end"));
  attachScroll();
}

  function effectiveOrderPrice(){
    const v = ($("#ord-price").value||"").toString().trim();
    if (v) return parseFloat(v.replace(/[^\d.\-]/g,""));
    return parseFloat(((p.price||"")+"").replace(/[^\d.\-]/g,""));
  }
  function recalcOrderTotal(){
    const q = parseFloat(($("#ord-qty").value||"0").replace(/[^\d.\-]/g,"")) || 0;
    const c = Math.max(1, parseInt($("#ord-colors").value||"1",10) || 1);
    const price = effectiveOrderPrice();
    const sizeStr = ($("#ord-size").value||"").trim() || (p.size||"");
    const unitId = p.priceUnit || "pcs";
    const measure = parseSizeMeasure(sizeStr);

    let perPiece = 1, perPieceLabel = "", dimsLabel = "";
    if (unitId === "sqm" && measure && measure.area>0){
      perPiece = measure.area;
      perPieceLabel = fmtMeters(measure.area)+" m²";
      if (measure.dims.length>=2){
        dimsLabel = fmtMeters(measure.dims[0])+" × "+fmtMeters(measure.dims[1])+" m";
      }
    } else if (unitId === "m" && measure && measure.length>0){
      perPiece = measure.length;
      perPieceLabel = fmtMeters(measure.length)+" m";
    }

    const tot = (q>0 && isFinite(price)) ? price*perPiece*q*c : 0;
    const row  = $("#ord-total-row");
    const brow = $("#ord-breakdown-row");
    if (q>0){
      row.style.display = "flex";
      $("#ord-total").textContent = (isFinite(tot)&&tot>0)
        ? (tot.toLocaleString(undefined,{maximumFractionDigits:2})+" "+(p.currency||"USD"))
        : "—";
      // Show breakdown if we have a non-trivial computation: area/length OR colors>1
      const hasMeasure = (unitId==="sqm"||unitId==="m") && perPiece!==1;
      if (isFinite(price) && (hasMeasure || c>1)){
        brow.style.display = "flex";
        const unitTxt = (unitId!=="pcs") ? "/"+PRICE_UNIT_ABBR(unitId) : "";
        const parts = [];
        if (hasMeasure){
          if (dimsLabel) parts.push(dimsLabel + " = " + perPieceLabel);
          else if (perPieceLabel) parts.push(perPieceLabel);
          parts.push(price.toLocaleString(undefined,{maximumFractionDigits:2})+unitTxt);
          parts.push(q + " יח׳");
          if (c>1) parts.push(c + " צבעים");
        } else {
          parts.push(q + " × " + price.toLocaleString(undefined,{maximumFractionDigits:2})+unitTxt);
          if (c>1) parts.push(c + " צבעים");
        }
        $("#ord-breakdown").textContent = parts.join(" × ");
      } else {
        brow.style.display = "none";
      }
    } else {
      row.style.display = "none";
      brow.style.display = "none";
    }
  }
  async function saveOrder(){
    const q = parseFloat(($("#ord-qty").value||"0").replace(/[^\d.\-]/g,""));
    const c = Math.max(1, parseInt($("#ord-colors").value||"1",10) || 1);
    p.orderQty = (isFinite(q) && q>0) ? q : 0;
    p.orderPrice = ($("#ord-price").value||"").trim();
    p.orderColors = c;
    p.orderSize = ($("#ord-size").value||"").trim();
    await idb.put("products", p);
  }
  $("#ord-qty").addEventListener("input", recalcOrderTotal);
  $("#ord-price").addEventListener("input", recalcOrderTotal);
  $("#ord-colors").addEventListener("input", recalcOrderTotal);
  $("#ord-size").addEventListener("input", recalcOrderTotal);
  $("#ord-qty").addEventListener("blur", async ()=>{ await saveOrder(); haptic("selection"); });
  $("#ord-price").addEventListener("blur", async ()=>{ await saveOrder(); haptic("selection"); });
  $("#ord-colors").addEventListener("blur", async ()=>{ await saveOrder(); haptic("selection"); });
  $("#ord-size").addEventListener("blur", async ()=>{ await saveOrder(); haptic("selection"); });
  recalcOrderTotal();

  attachScroll();
}

        toast("שמירה נכשלה");

      navigate("product",{id:c.dataset.id});
    }
  }));
  attachScroll();
}

async function renderReview(){
  setNavbar({title:"ביקורת ערב", large:true});
  const app = byId("app");
  const all = (await idb.all("products")).sort((a,b)=>a.dateAdded-b.dateAdded);
  const unrated = all.filter(p=>!p.reviewRating);
  const suppliers = await idb.all("suppliers");
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));

  if (all.length===0){
    app.innerHTML = `<div class="empty">
      <div class="em-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2.5l2.95 6.18 6.55.85-4.84 4.65 1.23 6.66L12 17.6l-5.89 3.24 1.23-6.66L2.5 9.53l6.55-.85L12 2.5z"/></svg>
      </div>
      <h2>אין מוצרים לביקורת</h2>
      <p>אחרי שתאסוף מוצרים, חזור לכאן בערב לדרג אותם.</p>
    </div>`;
    return;
  }
  if (unrated.length===0){
    app.innerHTML = `<div class="empty">
      <div class="em-icon green" style="background:rgba(52,199,89,0.18);color:var(--systemGreen)">
        <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
      </div>
      <h2>הכל דורג!</h2>
      <p>${all.length} מוצרים דורגו. ראה תובנות בסיכום.</p>
      <button class="btn" onclick="navigate('summary')">צפה בסיכום</button>
    </div>`;
    return;
  }

  let idx = 0;
  function show(){
    const p = unrated[idx];
    if (!p){ renderReview(); return; }
    const sup = supMap[p.supplierId];
    const photo = p.mainPhoto || (p.photos&&p.photos[0]);
    const pct = Math.round((idx/unrated.length)*100);
    app.innerHTML = `
      <div class="review-progress"><span>${idx+1} מתוך ${unrated.length}</span><span>${esc((sup&&sup.name)||"")}</span></div>
      <div class="review-progress-bar"><div style="width:${pct}%"></div></div>

      <div class="review-card" id="rcard">
        <div class="review-img" id="rimg">
          ${photo?`<img src="${photo}">`:`<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#444;font-size:48px">📦</div>`}
        </div>
        <div class="review-info">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px">
            <div style="font-size:20px;font-weight:700;letter-spacing:-0.013em">${p.price?esc(p.price)+" "+esc(p.currency||""):"ללא מחיר"}</div>
            <span class="pill">${esc(catShort(p.category))}</span>
          </div>
          <div class="muted" dir="auto">${esc(p.size||"")} ${p.size&&sup?" · ":""} ${esc((sup&&sup.name)||"")}</div>
          ${p.notes?`<div style="margin-top:10px;font-size:15px;line-height:20px">${nl2br(p.notes)}</div>`:""}
        </div>
      </div>

      <div class="rating-big" id="rb">
        ${[1,2,3,4,5].map(n=>`<button data-n="${n}">${n}</button>`).join("")}
      </div>
      <div class="list-section">
        <div class="list"><div class="form-row full">
          <textarea class="ftext" id="rn" placeholder="הערות (אופציונלי)..."></textarea>
        </div></div>
      </div>
      <div class="btn-stack">
        <button class="btn tinted" id="skip">דלג ➝</button>
        <button class="btn gray" id="open">פתח מוצר</button>
      </div>
      <div class="spacer-40"></div>
    `;

    // swipe gestures
    const card = $("#rcard");
    let startX=null, dx=0;
    card.addEventListener("touchstart", e=>{ startX = e.touches[0].clientX; dx=0; }, {passive:true});
    card.addEventListener("touchmove", e=>{
      if (startX===null) return;
      dx = e.touches[0].clientX - startX;
      card.style.transform = `translateX(${dx}px) rotate(${dx/30}deg)`;
      card.style.opacity = String(1 - Math.min(1, Math.abs(dx)/300));
    }, {passive:true});
    card.addEventListener("touchend", async ()=>{
      if (startX===null) return;
      if (Math.abs(dx)>120){
        // swipe = quick rate (left = 2★, right = 4★ — fast triage)
        const n = dx>0 ? 4 : 2;
        haptic("success");
        card.classList.add(dx>0?"swipe-right":"swipe-left");
        p.reviewRating = n; p.reviewNotes = $("#rn").value.trim();
        await idb.put("products", p);
        toast(`★${n}`);
        setTimeout(()=>{ idx++; show(); }, 250);
      } else {
        card.style.transform = "";
        card.style.opacity = "";
      }
      startX = null;
    });

    $$("#rb button").forEach(b=>b.addEventListener("click", async ()=>{
      const n = +b.dataset.n;
      haptic("success");
      p.reviewRating = n; p.reviewNotes = $("#rn").value.trim();
      await idb.put("products", p);
      toast(`★${n}`);
      idx++; show();
    }));
    $("#skip").addEventListener("click", ()=>{ haptic("selection"); idx++; show(); });
    $("#open").addEventListener("click", ()=>navigate("product",{id:p.id}));
  }
  show();
  attachScroll();
}

  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));

  const rated = products.filter(p=>p.reviewRating>0);
  const top = [...products].filter(p=>p.reviewRating>=4).sort((a,b)=>b.reviewRating-a.reviewRating).slice(0,8);
  const todayP = products.filter(p=>isToday(p.dateAdded));
  const byCat = {};
  products.forEach(p=>{ byCat[p.category||"other"] = (byCat[p.category||"other"]||0)+1; });

  const supScores = suppliers.map(s=>{
    const ps = products.filter(p=>p.supplierId===s.id);
    return {sup:s, prods:ps, score: supplierScore(ps)};
  });
  const orderRank = {"Priority Supplier":4,"Strong Supplier":3,"Interesting":2,"Low Interest":1,"No Products":0};
  const best = [...supScores].sort((a,b)=>{
    const ra = orderRank[a.score.label]||0, rb = orderRank[b.score.label]||0;
    if (rb!==ra) return rb-ra;
    return b.score.avg - a.score.avg;
  }).filter(x=>x.score.total>0).slice(0,10);

  app.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="num">${products.length}</div><div class="lab">מוצרים</div></div>
      <div class="stat"><div class="num">${suppliers.length}</div><div class="lab">ספקים</div></div>
      <div class="stat"><div class="num">${rated.length}</div><div class="lab">דורגו</div></div>
      <div class="stat"><div class="num">${todayP.length}</div><div class="lab">היום</div></div>
    </div>

    <div class="list-section">
      <div class="list-section-header">מוצרים מובילים</div>
      ${top.length ? `<div class="grid" style="padding:0">${top.map(p=>productCard(p,supMap[p.supplierId])).join("")}</div>` :
        `<div class="list"><div class="form-row" style="justify-content:center;color:var(--secondaryLabel);text-align:center;padding:18px">אין עדיין מוצרים מדורגים ★4+</div></div>`}
    </div>

    <div class="list-section">
      <div class="list-section-header">ספקי עדיפות</div>
      ${best.length ? `<div class="list">${best.map(({sup,prods,score})=>{
        const initial = (sup.name||"?").trim().charAt(0).toUpperCase();
        return `<div class="supplier-row" data-id="${sup.id}" style="cursor:pointer">
          <div class="savatar">${sup.businessCard?`<img src="${sup.businessCard}">`:esc(initial)}</div>
          <div class="sinfo">
            <div class="sname">${esc(sup.name||"ללא שם")}</div>
            <div class="smeta">
              <span>${prods.length} מוצרים</span>
              ${score.avg?`<span>★ ${score.avg.toFixed(1)}</span>`:""}
              ${score.strong?`<span>${score.strong} חזקים</span>`:""}
            </div>
          </div>
          <span class="pill ${score.tone}">${esc(score.label)}</span>
        </div>`;
      }).join("")}</div>` : `<div class="list"><div class="form-row" style="justify-content:center;color:var(--secondaryLabel);padding:18px">אין עדיין ספקים</div></div>`}
    </div>

    <div class="list-section">
      <div class="list-section-header">לפי קטגוריה</div>
      <div class="list">
        ${CATEGORIES.map(c=>{
          const n = byCat[c.id]||0;
          const pct = products.length ? Math.round(n*100/products.length) : 0;
          return `<div class="form-row" style="justify-content:space-between">
            <span>${esc(catShort(c.id))}</span>
            <span style="display:flex;gap:10px;align-items:center">
              <span class="muted">${pct}%</span>
              <span style="font-weight:600;min-width:24px;text-align:end">${n}</span>
            </span>
          </div>`;
        }).join("")}
      </div>
    </div>

    <div class="list-section">
      <div class="list-section-header">ייצוא</div>
      <div class="list">
        <div class="list-row tap" data-act="xlsx">
          <div class="lead-icon green"><svg viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M9 13l2 2 4-4"/></svg></div>
          <div class="row-main"><div class="row-title">Excel עם תמונות</div><div class="row-sub">.xlsx — תמונות מוטמעות</div></div>
          <span class="row-chev"><svg viewBox="0 0 7 13"><path d="M1 1l5 5.5L1 12"/></svg></span>
        </div>
        <div class="list-row tap" data-act="csv">
          <div class="lead-icon"><svg viewBox="0 0 24 24"><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg></div>
          <div class="row-main"><div class="row-title">CSV</div><div class="row-sub">טקסט בלבד</div></div>
          <span class="row-chev"><svg viewBox="0 0 7 13"><path d="M1 1l5 5.5L1 12"/></svg></span>
        </div>
        <div class="list-row tap" data-act="text">
          <div class="lead-icon orange"><svg viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M8 13h8M8 17h6"/></svg></div>
          <div class="row-main"><div class="row-title">סיכום טקסטואלי</div><div class="row-sub">.txt</div></div>
          <span class="row-chev"><svg viewBox="0 0 7 13"><path d="M1 1l5 5.5L1 12"/></svg></span>
        </div>
        <div class="list-row tap" data-act="json">
          <div class="lead-icon purple"><svg viewBox="0 0 24 24"><path d="M9 3H7a4 4 0 0 0-4 4v2a3 3 0 0 1-3 3 3 3 0 0 1 3 3v2a4 4 0 0 0 4 4h2"/><path d="M15 3h2a4 4 0 0 1 4 4v2a3 3 0 0 0 3 3 3 3 0 0 0-3 3v2a4 4 0 0 1-4 4h-2"/></svg></div>
          <div class="row-main"><div class="row-title">גיבוי JSON</div><div class="row-sub">כולל תמונות, ניתן לייבוא</div></div>
          <span class="row-chev"><svg viewBox="0 0 7 13"><path d="M1 1l5 5.5L1 12"/></svg></span>
        </div>
        <div class="list-row tap" data-act="import">
          <div class="lead-icon gray"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5-5 5 5"/><path d="M12 5v12"/></svg></div>
          <div class="row-main"><div class="row-title">ייבוא JSON</div><div class="row-sub">משחזר גיבוי</div></div>
          <span class="row-chev"><svg viewBox="0 0 7 13"><path d="M1 1l5 5.5L1 12"/></svg></span>
        </div>
      </div>
    </div>

    <div class="spacer-40"></div>
  `;

  $$(".supplier-row", app).forEach(r=>r.addEventListener("click", ()=>{
    haptic("selection"); navigate("supplier",{id:r.dataset.id});
  }));
  $$(".pcard", app).forEach(c=>c.addEventListener("click", ()=>{
    haptic("selection"); navigate("product",{id:c.dataset.id});
  }));
  $$("[data-act]", app).forEach(r=>r.addEventListener("click", ()=>{
    haptic("selection");
    const a = r.dataset.act;
    if (a==="xlsx") return exportXLSX();
    if (a==="csv")  return exportCSV();
    if (a==="text") return exportSummary();
    if (a==="json") return exportJSON();
    if (a==="import") return importJSON();
  }));
  attachScroll();
}

   ============================================================ */
function downloadFile(filename, content, mime="application/json"){
  const blob = (content instanceof Blob) ? content : new Blob([content],{type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
async function exportJSON(){
  const [suppliers,products,sessions] = await Promise.all([idb.all("suppliers"),idb.all("products"),idb.all("sessions")]);
  const stamp = new Date().toISOString().slice(0,10);
  downloadFile(`tradefair-${stamp}.json`, JSON.stringify({version:1, exportedAt:Date.now(), suppliers, products, sessions}, null, 2));
  haptic("success"); toast("יוצא ✓");
}
async function exportCSV(){
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));
  const q = v => `"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const rows = [["Supplier","Booth","Country","Phone","Email","Product","Category","Price","Currency","Size","Rating","Notes","Review Notes","Date"].map(q).join(",")];
  products.forEach(p=>{
    const s = supMap[p.supplierId]||{};
    rows.push([s.name||"", s.boothNumber||"", s.country||"", s.phone||"", s.email||"", p.name||"", catShort(p.category), p.price||"", p.currency||"", p.size||"", p.reviewRating||"", p.notes||"", p.reviewNotes||"", new Date(p.dateAdded).toISOString()].map(q).join(","));
  });
  const stamp = new Date().toISOString().slice(0,10);
  downloadFile(`tradefair-${stamp}.csv`, "\uFEFF"+rows.join("\n"), "text/csv");
  haptic("success"); toast("יוצא ✓");
}
async function exportSummary(){
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));
  const lines = [];
  lines.push("Trade Fair Summary");
  lines.push("==================");
  lines.push(`Date: ${new Date().toLocaleDateString()}`);
  lines.push(`Products: ${products.length}  |  Suppliers: ${suppliers.length}`);
  lines.push("");
  const supScores = suppliers.map(s=>{
    const ps = products.filter(p=>p.supplierId===s.id);
    return {sup:s, prods:ps, score: supplierScore(ps)};
  }).filter(x=>x.score.total>0).sort((a,b)=>b.score.avg-a.score.avg);

  lines.push("-- Priority Suppliers --");
  supScores.filter(x=>x.score.label==="Priority Supplier").forEach(x=>{
    lines.push(`★ ${x.sup.name||"-"} – ${x.prods.length} products, avg ${x.score.avg.toFixed(1)}, ${x.score.strong} strong`);
    if (x.sup.boothNumber) lines.push(`  Booth: ${x.sup.boothNumber}`);
    if (x.sup.phone) lines.push(`  Phone: ${x.sup.phone}`);
    if (x.sup.email) lines.push(`  Email: ${x.sup.email}`);
  });
  lines.push("");
  lines.push("-- Strong Suppliers --");
  supScores.filter(x=>x.score.label==="Strong Supplier").forEach(x=>{
    lines.push(`• ${x.sup.name||"-"} – ${x.prods.length} products, avg ${x.score.avg.toFixed(1)}`);
  });
  lines.push("");
  lines.push("-- Top Products (★4+) --");
  products.filter(p=>p.reviewRating>=4).sort((a,b)=>b.reviewRating-a.reviewRating).forEach(p=>{
    const s = supMap[p.supplierId];
    lines.push(`★${p.reviewRating}  ${p.name||catShort(p.category)}  ${p.price||""} ${p.currency||""}  –  ${(s&&s.name)||""}`);
    if (p.size) lines.push(`       size: ${p.size}`);
    if (p.notes) lines.push(`       ${p.notes}`);
  });

  const stamp = new Date().toISOString().slice(0,10);
  downloadFile(`tradefair-summary-${stamp}.txt`, lines.join("\n"), "text/plain");
  haptic("success"); toast("יוצא ✓");
}
async function exportXLSX(){
  if (!window.ExcelJS){ alert("טעינת ספריית Excel נכשלה. דרושה התחברות לאינטרנט פעם ראשונה."); return; }
  toast("בונה Excel...");
  const [products, suppliers] = await Promise.all([idb.all("products"), idb.all("suppliers")]);
  const supMap = Object.fromEntries(suppliers.map(s=>[s.id,s]));

  const wb = new ExcelJS.Workbook();
  wb.creator = "Trade Fair Capture";
  wb.created = new Date();

  const ws = wb.addWorksheet("Products", { views:[{rightToLeft:true}] });
  ws.addRow(["#","Photo","Supplier","Booth","Country","Product","Category","Price","Currency","Size","Rating","Notes","Review Notes","Date"]);
  const hr = ws.getRow(1);
  hr.font={bold:true,color:{argb:"FFFFFFFF"}}; hr.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0F172A"}}; hr.height=26;
  hr.alignment={vertical:"middle",horizontal:"center"};
  ws.columns=[{width:5},{width:18},{width:24},{width:9},{width:12},{width:24},{width:14},{width:10},{width:9},{width:14},{width:8},{width:36},{width:30},{width:14}];

  const sorted = [...products].sort((a,b)=>{
    const sa=(supMap[a.supplierId]||{}).name||"";
    const sb=(supMap[b.supplierId]||{}).name||"";
    if (sa!==sb) return sa.localeCompare(sb);
    return a.dateAdded-b.dateAdded;
  });
  for (let i=0;i<sorted.length;i++){
    const p=sorted[i];
    const s=supMap[p.supplierId]||{};
    const r=ws.addRow([i+1,"",s.name||"",s.boothNumber||"",s.country||"",p.name||"",catShort(p.category),p.price||"",p.currency||"",p.size||"",p.reviewRating||"",p.notes||"",p.reviewNotes||"",new Date(p.dateAdded).toLocaleString("he-IL")]);
    r.height=95; r.alignment={vertical:"middle",wrapText:true};
    if (i%2===1) r.eachCell(c=>c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF7F7F6"}});
    if (p.reviewRating>=4){ r.getCell(11).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFDCFCE7"}}; r.getCell(11).font={bold:true,color:{argb:"FF166534"}}; }
    const photo = p.mainPhoto||(p.photos&&p.photos[0]);
    if (photo){
      try{
        const m = photo.match(/^data:image\/(\w+);base64,(.+)$/);
        if (m){
          const ext=(m[1]==="jpg"?"jpeg":m[1]).toLowerCase();
          const id=wb.addImage({base64:m[2],extension:ext});
          ws.addImage(id,{tl:{col:1.05,row:r.number-1+0.05},ext:{width:120,height:120},editAs:"oneCell"});
        }
      }catch(e){}
    }
  }
  ws.views=[{state:"frozen",ySplit:1,rightToLeft:true}];

  const ws2 = wb.addWorksheet("Suppliers",{views:[{rightToLeft:true}]});
  ws2.addRow(["#","Card","Supplier","Contact","Phone","Email","Booth","Country","Products","Avg","Strong","Priority","Notes","Date"]);
  const hr2=ws2.getRow(1); hr2.font={bold:true,color:{argb:"FFFFFFFF"}}; hr2.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0F172A"}}; hr2.height=26;
  hr2.alignment={vertical:"middle",horizontal:"center"};
  ws2.columns=[{width:5},{width:24},{width:22},{width:18},{width:18},{width:24},{width:9},{width:12},{width:10},{width:8},{width:9},{width:18},{width:32},{width:14}];

  const supSorted = suppliers.slice().sort((a,b)=>(b.dateAdded||0)-(a.dateAdded||0));
  for (let i=0;i<supSorted.length;i++){
    const s=supSorted[i];
    const ps=products.filter(p=>p.supplierId===s.id);
    const sc=supplierScore(ps);
    const r=ws2.addRow([i+1,"",s.name||"",s.contactPerson||"",s.phone||"",s.email||"",s.boothNumber||"",s.country||"",ps.length,sc.avg?Number(sc.avg.toFixed(2)):"",sc.strong||"",sc.label,s.notes||"",new Date(s.dateAdded).toLocaleDateString("he-IL")]);
    r.height=110; r.alignment={vertical:"middle",wrapText:true};
    if (i%2===1) r.eachCell(c=>c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF7F7F6"}});
    if (sc.label==="Priority Supplier"){ r.getCell(12).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0F172A"}}; r.getCell(12).font={bold:true,color:{argb:"FFFFFFFF"}}; }
    else if (sc.label==="Strong Supplier"){ r.getCell(12).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFDCFCE7"}}; r.getCell(12).font={bold:true,color:{argb:"FF166534"}}; }
    if (s.businessCard){
      try{
        const m = s.businessCard.match(/^data:image\/(\w+);base64,(.+)$/);
        if (m){
          const ext=(m[1]==="jpg"?"jpeg":m[1]).toLowerCase();
          const id=wb.addImage({base64:m[2],extension:ext});
          ws2.addImage(id,{tl:{col:1.05,row:r.number-1+0.05},ext:{width:160,height:130},editAs:"oneCell"});
        }
      }catch(e){}
    }
  }
  ws2.views=[{state:"frozen",ySplit:1,rightToLeft:true}];

  const ws3 = wb.addWorksheet("All Photos",{views:[{rightToLeft:true}]});
  ws3.addRow(["#","Photo","Supplier","Product","Category","Price","Size","Rating"]);
  const hr3=ws3.getRow(1); hr3.font={bold:true,color:{argb:"FFFFFFFF"}}; hr3.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0F172A"}}; hr3.height=26;
  ws3.columns=[{width:5},{width:18},{width:22},{width:22},{width:14},{width:10},{width:14},{width:8}];
  let n=0;
  for (const p of sorted){
    const sup=supMap[p.supplierId]||{};
    const phs = (p.photos&&p.photos.length)?p.photos:(p.mainPhoto?[p.mainPhoto]:[]);
    for (const photo of phs){
      n++;
      const r=ws3.addRow([n,"",sup.name||"",p.name||catShort(p.category),catShort(p.category),p.price?p.price+" "+(p.currency||""):"",p.size||"",p.reviewRating||""]);
      r.height=95; r.alignment={vertical:"middle",wrapText:true};
      try{
        const m = photo.match(/^data:image\/(\w+);base64,(.+)$/);
        if (m){
          const ext=(m[1]==="jpg"?"jpeg":m[1]).toLowerCase();
          const id=wb.addImage({base64:m[2],extension:ext});
          ws3.addImage(id,{tl:{col:1.05,row:r.number-1+0.05},ext:{width:120,height:120},editAs:"oneCell"});
        }
      }catch(e){}
    }
  }
  ws3.views=[{state:"frozen",ySplit:1,rightToLeft:true}];

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const stamp = new Date().toISOString().slice(0,10);
  downloadFile(`tradefair-${stamp}.xlsx`, blob);
  haptic("success"); toast("Excel נוצר ✓");
}

function importJSON(){
  const inp = document.createElement("input");
  inp.type="file"; inp.accept=".json,application/json";
  inp.onchange = async ()=>{
    const f = inp.files[0]; if(!f) return;
    try{
      const d = JSON.parse(await f.text());
      if (!d.products && !d.suppliers){ alert("קובץ לא תקין"); return; }
      if (!await confirmSheet("ייבוא יוסיף/יעדכן נתונים. להמשיך?","ייבא")) return;
      for (const s of (d.suppliers||[])) await idb.put("suppliers", s);
      for (const p of (d.products||[])) await idb.put("products", p);
      for (const ss of (d.sessions||[])) await idb.put("sessions", ss);
      haptic("success"); toast("יובא ✓"); render();
    }catch(err){ alert("שגיאה: "+err.message); }
  };
  inp.click();
}

document.addEventListener("touchend", e=>{
  const now = Date.now();

  lastTouch = now;
}, {passive:false});
